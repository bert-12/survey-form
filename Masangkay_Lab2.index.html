<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4;">

    <div style="width: 500px;
                margin: 30px auto;
                background-color: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px rgba(0,0,0,0.1);"> 

        <h2 style="text-align:center; color:#333;">Overall Student Experience Form</h2>

        <form method="post" action="https://script.google.com/macros/s/AKfycbx4EgyK5mhEhb9s2k7mUHytatP-q6h2V86TtXYGiJ7-D6aN9S97l4fFcCOGMGTGKLnbwg/exec">

            <p>Please fill out the form below:</p>

            <label for="fname"><strong>First Name:</strong></label><br>
            <input type="text" id="fname" name="fname"
                style="width:100%; padding:8px; margin-top:5px; margin-bottom:10px;"><br>

            <label for="mname"><strong>Middle Name:</strong></label><br>
            <input type="text" id="mname" name="mname"
                style="width:100%; padding:8px; margin-top:5px; margin-bottom:10px;"><br>

            <label for="lname"><strong>Last Name:</strong></label><br>
            <input type="text" id="lname" name="lname"
                style="width:100%; padding:8px; margin-top:5px; margin-bottom:10px;"><br>

            <label for="age"><strong>Age:</strong></label><br>
            <input type="number" id="age" name="age"
                style="width:100%; padding:8px; margin-top:5px; margin-bottom:10px;"><br>

            <label for="email"><strong>Email:</strong></label><br>
            <input type="email" id="email" name="email"
                style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px;"><br>

            <strong>Select your Gender:</strong><br><br>

            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female" style="margin-left:20px;">
            <label for="female">Female</label>

            <br><br>

            <strong>Days of the Week You Are Available:</strong><br><br>

            <input type="checkbox" id="monday" name="days" value="monday">
            <label for="monday">Monday</label><br>

            <input type="checkbox" id="tuesday" name="days" value="tuesday">
            <label for="tuesday">Tuesday</label><br>

            <input type="checkbox" id="wednesday" name="days" value="wednesday">
            <label for="wednesday">Wednesday</label><br>

            <input type="checkbox" id="thursday" name="days" value="thursday">
            <label for="thursday">Thursday</label><br>

            <input type="checkbox" id="friday" name="days" value="friday">
            <label for="friday">Friday</label><br>

            <input type="checkbox" id="saturday" name="days" value="saturday">
            <label for="saturday">Saturday</label><br>

            <input type="checkbox" id="sunday" name="days" value="sunday">
            <label for="sunday">Sunday</label>

            <br><br>

            <label for="college"><strong>Select your College Department:</strong></label><br><br>

            <select id="college" name="college"
                style="width:100%; padding:8px; margin-bottom:15px;">
                <option value="cics">CICS</option>
                <option value="cbaa">CBAA</option>
                <option value="clac">CLAC</option>
                <option value="ccje">CCJE</option>
                <option value="coe">COE</option>
                <option value="cos">COS</option>
                <option value="ceat">CEAT</option>
                <option value="cthm">CTHM</option>
            </select>

            <strong>How satisfied are you with your college experience?</strong><br><br>

            <input type="radio" id="verySatisfied" name="satisfaction" value="Very Satisfied">
            <label for="verySatisfied">Very Satisfied</label><br>

            <input type="radio" id="satisfied" name="satisfaction" value="Satisfied">
            <label for="satisfied">Satisfied</label><br>

            <input type="radio" id="neutral" name="satisfaction" value="Neutral">
            <label for="neutral">Neutral</label><br>

            <input type="radio" id="dissatisfied" name="satisfaction" value="Dissatisfied">
            <label for="dissatisfied">Dissatisfied</label><br>

            <input type="radio" id="veryDissatisfied" name="satisfaction" value="Very Dissatisfied">
            <label for="veryDissatisfied">Very Dissatisfied</label>

            <br><br>

            <label for="feedback"><strong>Additional Feedback:</strong></label><br>
            <textarea id="feedback" name="feedback" rows="5"
                placeholder="Enter your comments, suggestions, or feedback here..."
                style="width:100%; padding:8px; margin-top:5px;"></textarea>

            <br><br>

            <div style="text-align:center;">

                <input type="submit" value="Submit"
                    style="background-color:#4CAF50;
                           color:white;
                           border:none;
                           padding:10px 20px;
                           border-radius:5px;
                           cursor:pointer;">

                <input type="reset" value="Reset"
                    style="background-color:#f44336;
                           color:white;
                           border:none;
                           padding:10px 20px;
                           border-radius:5px;
                           cursor:pointer;
                           margin-left:10px;">

            </div>

        </form>

    </div>

</body>
</html>
